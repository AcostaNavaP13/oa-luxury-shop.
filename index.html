<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos</title>
    <!-- Use Inter font to simulate iOS / Apple design -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="ios-nav">
        <div class="nav-content">
            <div style="display: flex; align-items: center;">
                <img src="logo.png" alt="O&A Logo" class="brand-logo" style="height: 48px; object-fit: contain;">
                <span style="font-weight: 700; font-size: 20px; margin-left: 12px; letter-spacing: -0.5px;">O&A Luxury shop</span>
            </div>
            <div style="display: flex; gap: 16px; align-items: center;">
                <button id="theme-toggle" class="theme-btn ios-btn" style="width: auto; margin: 0; padding: 6px 14px; font-size: 14px;">🌙 Oscuro</button>
                <a href="admin.html" class="nav-link">Acceso Admin</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <header class="page-header">
            <h2>Descubre nuestros productos</h2>
            <p>Selecciona lo que necesites y pídelo fácil por WhatsApp.</p>
        </header>

        <!-- Product Grid -->
        <div id="product-grid" class="grid">
            <!-- Products will be injected here via JavaScript -->
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="theme.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
