<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos</title>
    <!-- Use Inter font to simulate iOS / Apple design -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Pantalla de Carga (Loading) -->
    <div id="oa-loading">
        <img src="logo.png" alt="Cargando O&A Luxury" />
    </div>

    <!-- Top Navigation Bar -->
    <nav class="ios-nav">
        <div class="nav-content">
            <div style="display: flex; align-items: center;">
                <img src="logo.png" alt="O&A Logo" class="brand-logo" style="height: 48px; object-fit: contain;">
                <span style="font-weight: 700; font-size: 20px; margin-left: 12px; letter-spacing: -0.5px;">O&A Luxury shop</span>
            </div>
            <div style="display: flex; gap: 16px; align-items: center;">
                <button onclick="toggleCart()" class="nav-link" style="background:none; border:none; cursor:pointer; position:relative; color: var(--apple-blue); display: inline-flex; align-items: center;" title="Ver Carrito">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                    <span id="cart-badge" style="position: absolute; top: -6px; right: -8px; background: var(--apple-red); color: #FFF; font-size: 11px; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: bold;">0</span>
                </button>
                <button id="theme-toggle" class="theme-btn ios-btn" style="width: auto; margin: 0; padding: 6px 14px; font-size: 14px; display: inline-flex; align-items: center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg> Oscuro</button>
                <a href="admin.html" class="nav-link" style="display: inline-flex; align-items: center;" title="Acceso Admin">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <header class="page-header">
            <h2>Luxury Collection</h2>
            <p>Descubre el estilo O&A para ti.</p>
        </header>

        <!-- Filters Section -->
        <div class="filters-container">
            <select id="filter-category" class="ios-select">
                <option value="">Artículos (Todos)</option>
            </select>
            <select id="filter-brand" class="ios-select">
                <option value="">Marcas (Todas)</option>
            </select>
            <select id="filter-size" class="ios-select">
                <option value="">Tallas (Todas)</option>
            </select>
            <select id="sort-price" class="ios-select">
                <option value="">Precio (Relevancia)</option>
                <option value="asc">Menor a Mayor</option>
                <option value="desc">Mayor a Menor</option>
            </select>
        </div>

        <!-- Product Grid -->
        <div id="product-grid" class="grid">
            <!-- Products will be injected here via JavaScript -->
        </div>
    </main>

    <!-- Cart Modal -->
    <div id="cart-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px; padding: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin: 0;">Mi Carrito</h3>
                <button onclick="toggleCart()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-secondary);">&times;</button>
            </div>
            <div id="cart-items-container" style="max-height: 50vh; overflow-y: auto; text-align: left;">
                <!-- items injected via js -->
            </div>
            <div style="border-top: 1px solid #E5E5EA; margin-top: 15px; padding-top: 15px; text-align: left;" class="cart-footer-border">
                <h3 style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <span>Subtotal:</span>
                    <span id="cart-total">$0.00</span>
                </h3>
                <button id="checkout-btn" class="ios-btn" style="background-color: var(--apple-green); color: white;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: text-bottom;"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                    Comprar por WhatsApp
                </button>
                <button onclick="clearCart()" class="ios-btn secondary-btn" style="color: var(--apple-red); margin-top: 10px; padding: 10px;">Vaciar Carrito</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="theme.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
